<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>댓글 수정</h1>
<form id="postForm" action="/edit/post" method="post">
    <label for="title">제목</label>
    <input id="title" type="text" required/>
    <p id="titleError"></p>
    <label for="content">내용</label>
    <br/>
    <textarea id="content" rows="10" cols="50" maxlength="500"></textarea>
    <br/>
    <button type="submit">수정</button>
</form>
<script src="/js/editPost.js"></script>
</body>
</html>
