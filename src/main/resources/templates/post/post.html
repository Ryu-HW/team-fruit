<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>댓글 수정</h1>
<form id="postForm" th:action="@{/edit/post}" method="post">
    <input type="hidden" name="id" th:value="${posts.id}"/>
    <label>제목</label>
    <br/>
    <input type="text" name="title" th:value="${posts.title}" required/>
    <br/>
    <label>내용</label>
    <br/>
    <textarea rows="10" cols="50" maxlength="500" name="content" th:text="${posts.content}"></textarea>
    <br/>
    <button type="submit">수정</button>
</form>
</body>
</html>
